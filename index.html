<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Plan Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button id="toggleAddBtn" class="btn" style="flex:1;" onclick="toggleAddSection()">테마 등록</button>
        <button id="toggleManageBtn" class="btn btn-secondary" style="flex:1;" onclick="toggleManageBar()">테마 수정</button>
    </div>
    <div class="card" id="addSection" style="display:none;">
        <h2 id="formTitle">➕ 새 테마 등록</h2>
        <label for="newName">테마명</label>
        <input type="text" id="newName" placeholder="테마명 (예: CLAIM)">
        <label for="newShop">매장명</label>
        <input type="text" id="newShop" placeholder="매장명 (예: 키이스케이프 로그)">
        <label for="newDayType">요일</label>
        <select id="newDayType">
            <option value="평일" selected>평일</option>
            <option value="주말">주말</option>
        </select>
        <label for="newDuration">소요시간(분)</label>
        <input type="number" id="newDuration" placeholder="소요시간 (분)">
        <label for="newSlotTime">시간표 추가 <small style="font-weight:500;color:#94a3b8;">(클릭 또는 입력 · 24시간)</small></label>
        <div class="slot-time-row" style="display:flex; gap:8px; align-items:center;">
            <input type="text" id="newSlotTime" class="input-hhmm" placeholder="14:40" autocomplete="off" spellcheck="false" style="flex:1;">
            <button class="btn btn-secondary" style="width:auto; padding:10px 12px;" onclick="addSlot('new')">추가</button>
        </div>
        <div id="newSlotBadges" class="slot-badges" style="margin:8px 0 6px 0;"></div>
        <small style="display:block; color:#64748b; margin:4px 0;">또는 CSV/공백으로 여러 시간 입력 가능</small>
        <label for="newSlots">CSV/공백 입력</label>
        <input type="text" id="newSlots" placeholder="예: 10:00, 10:30 11:00">
        <button class="btn btn-secondary" style="margin-top:4px;" onclick="applyCsv('new')">CSV 적용</button>
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button id="formSaveBtn" class="btn" style="flex:1;" onclick="saveThemeFromForm()">시트에 저장 및 새로고침</button>
            <button id="formDeleteBtn" class="btn btn-secondary" style="flex:1; background:#ef4444; color:white; display:none;" onclick="deleteFromForm()">삭제</button>
        </div>
    </div>

    <div id="manageBar" class="card" style="padding:12px; display:none;">
        <div style="display:flex; gap:8px; align-items:center;">
            <select id="manageThemeSelect" style="flex:1; padding:10px;"></select>
            <button class="btn btn-secondary" style="width:auto; padding:10px 12px;" onclick="manageEdit()">수정</button>
            <button class="btn btn-secondary" style="width:auto; padding:10px 12px;" onclick="manageDelete()">삭제</button>
        </div>
    </div>

    <div class="card" id="editSection" style="display:none;">
        <h2>✏️ 테마 수정</h2>
        <label for="editName">테마명</label>
        <input type="text" id="editName" placeholder="테마명">
        <label for="editShop">매장명</label>
        <input type="text" id="editShop" placeholder="매장명">
        <label for="editDuration">소요시간(분)</label>
        <input type="number" id="editDuration" placeholder="소요시간 (분)">
        <label for="editSlotTime">시간표 추가 <small style="font-weight:500;color:#94a3b8;">(클릭 또는 입력 · 24시간)</small></label>
        <div class="slot-time-row" style="display:flex; gap:8px; align-items:center;">
            <input type="text" id="editSlotTime" class="input-hhmm" placeholder="14:40" autocomplete="off" spellcheck="false" style="flex:1;">
            <button class="btn btn-secondary" style="width:auto; padding:10px 12px;" onclick="addSlot('edit')">추가</button>
        </div>
        <div id="editSlotBadges" class="slot-badges" style="margin:8px 0 6px 0;"></div>
        <small style="display:block; color:#64748b; margin:4px 0;">또는 CSV/공백으로 여러 시간 입력 가능</small>
        <label for="editSlots">CSV/공백 입력</label>
        <input type="text" id="editSlots" placeholder="예: 10:00, 10:30 11:00">
        <button class="btn btn-secondary" style="margin-top:4px;" onclick="applyCsv('edit')">CSV 적용</button>
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn" style="flex:1;" onclick="saveEdit()">저장</button>
            <button class="btn btn-secondary" style="flex:1; background:#ef4444; color:white;" onclick="deleteFromEdit()">삭제</button>
            <button class="btn btn-secondary" style="flex:1;" onclick="closeEditSection()">닫기</button>
        </div>
    </div>

    <div class="card">
        <h2>⚙️ 일정 설정</h2>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>시작 가능 시간 <small style="font-weight:500;color:#94a3b8;">(클릭 또는 입력 · 24시간)</small></label>
                <input type="text" id="startTime" class="input-hhmm" value="17:25" placeholder="17:25" autocomplete="off" spellcheck="false">
            </div>
            <div style="flex:1;">
                <label>목표 개수</label>
                <select id="targetCount">
                    <option value="2">2개</option>
                    <option value="3" selected>3개</option>
                    <option value="4">4개</option>
                </select>
            </div>
        </div>

        <label>🧩 테마 선택 (중복 선택 가능)</label>
        <div style="display:flex; gap:8px; align-items:center; margin:6px 0;">
            <label for="listDayType" style="margin:0;">조회 요일</label>
            <select id="listDayType" style="width:auto;">
                <option value="평일" selected>평일</option>
                <option value="주말">주말</option>
            </select>
        </div>
        <div id="consistencySummary" style="font-size:0.8rem; color:#64748b; margin:6px 0 6px 2px;"></div>
        <div id="themeSelector" class="theme-selector">
            <div class="loading-spinner">데이터 로딩 중...</div>
        </div>

        <label style="display:flex; align-items:center; gap:10px; margin-top:8px; font-size:0.9rem; font-weight:600; color:#475569; cursor:pointer;">
            <input type="checkbox" id="useFixedOrder" style="width:auto; margin:0;">
            지정 순서로만 계산
        </label>
        <div id="themeOrderPanelWrap" style="display:none;">
            <p id="themeOrderHelp" class="fixed-order-help">체크한 테마를 아래 순서대로 방문합니다. ↑↓로 순서를 바꿀 수 있습니다. 목표 개수가 N이면 위에서부터 N개만 사용합니다.</p>
            <div id="themeOrderPanel"></div>
        </div>

        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>동일매장 간격</label>
                <input type="number" id="sameGap" value="10">
            </div>
            <div style="flex:1;">
                <label>타매장 간격</label>
                <input type="number" id="diffGap" value="25">
            </div>
        </div>

        <label style="display:flex; align-items:center; gap:10px; margin-top:4px; font-size:0.9rem; font-weight:600; color:#475569; cursor:pointer;">
            <input type="checkbox" id="mealEnabled" style="width:auto; margin:0;">
            밥시간 반영 (아래 구간 안에 ‘휴식·밥’으로 쓸 연속 시간이 있도록 계산)
        </label>
        <div id="mealRangeRow" class="meal-fields-row" style="opacity:0.5; pointer-events:none;">
            <div class="meal-field-col">
                <label class="meal-field-label" for="mealStart">
                    <span class="meal-field-label-main">밥시간 시작</span>
                    <small class="meal-field-label-sub">가능한 범위</small>
                </label>
                <input type="text" id="mealStart" class="input-hhmm" value="18:00" placeholder="18:00" autocomplete="off" spellcheck="false">
            </div>
            <div class="meal-field-col">
                <label class="meal-field-label" for="mealEnd">
                    <span class="meal-field-label-main">밥시간 끝</span>
                    <small class="meal-field-label-sub">가능한 범위</small>
                </label>
                <input type="text" id="mealEnd" class="input-hhmm" value="19:00" placeholder="19:00" autocomplete="off" spellcheck="false">
            </div>
            <div class="meal-field-col">
                <label class="meal-field-label" for="mealBreakMinutes">
                    <span class="meal-field-label-main">휴식·밥 (분)</span>
                    <small class="meal-field-label-sub">위 구간 안 연속 빈 시간</small>
                </label>
                <input type="number" id="mealBreakMinutes" min="5" max="300" step="5" value="40" inputmode="numeric">
            </div>
        </div>

        <button class="btn" style="background: #1e293b;" onclick="runCalculation()">최적 일정 계산</button>
    </div>

    <div id="resultContainer"></div>
</div>


<script defer src="js/state.js"></script>
<script defer src="js/time.js"></script>
<script defer src="js/theme-validation.js"></script>
<script defer src="js/schedule.js"></script>
<script defer src="js/app-ui.js"></script>
<script defer src="js/main.js"></script>
</body>
</html>
